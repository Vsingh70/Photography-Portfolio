name: Generate Galleries

# Runs the variant pipeline (Supabase → Sharp → R2 → JSON) and commits the
# resulting src/generated/*.json + scripts/.manifests/* (+ public/about/about.webp)
# back to main if anything actually changed.
#
# Triggered:
#   - On manual click in the GitHub UI (workflow_dispatch)
#   - On a repository_dispatch with event_type "studio-publish",
#     fired by the Vercel /api/studio/publish endpoint after Studio
#     finishes writing projects/images to Supabase
on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [studio-publish]

# One run at a time (they write the same manifests / R2 keys). A newer dispatch
# SUPERSEDES an older queued/running one: the build is incremental and the
# manifest is only committed at the very end, so cancelling mid-run leaves no
# partial state — the next run just redoes the idempotent R2 uploads. This also
# stops a single hung run from holding the lock and stalling every publish
# behind it (the old `cancel-in-progress: false` + 120-min timeout pile-up).
concurrency:
  group: generate-galleries
  cancel-in-progress: true

jobs:
  generate:
    name: Build variants + commit
    runs-on: ubuntu-latest
    # Backstop so a hung run self-fails (was 120 → up to a 2h lock hold). Covers
    # a large from-scratch rebuild with headroom; normal incremental runs are
    # a few minutes. A newer publish supersedes a stuck run sooner (concurrency).
    timeout-minutes: 60
    permissions:
      # Required to push the commit back to main.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need write token so the auto-commit can push.
          token: ${{ secrets.GH_DISPATCH_PAT || secrets.GITHUB_TOKEN }}
          # Full history so the commit graph stays clean.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run generate-galleries
        working-directory: app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          NEXT_PUBLIC_GALLERY_CDN_BASE: ${{ secrets.NEXT_PUBLIC_GALLERY_CDN_BASE }}
        run: npm run generate-galleries

      - name: Commit + push generated JSON / manifests if anything changed
        run: |
          git config user.name "vflics-bot"
          git config user.email "bot@vflics.com"
          # Stage only what the script writes — avoids picking up stray edits.
          git add app/src/generated/*.json
          git add app/src/generated/projects-registry.ts
          git add app/scripts/.manifests/
          git add app/public/about/about.webp
          # If nothing changed, the commit step exits 0 silently.
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          # Construct a short summary of which projects changed.
          changed=$(git diff --cached --name-only | grep -oE 'project-[^/]+\.json' | sed -E 's/project-(.*)\.json/\1/' | sort -u | paste -sd ", " -)
          msg="chore(galleries): auto-update from generate-galleries (${changed:-site})"
          git commit -m "$msg" -m "Triggered by ${{ github.event_name }} on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          # Push with rebase-retry: main may have advanced during the run (a manual
          # push, or another job). The bot commit only touches generated JSON /
          # manifests / about.webp, so rebasing onto the latest main is clean.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}) — rebasing onto origin/main and retrying…"
            git fetch origin main || exit 1
            git rebase origin/main || { git rebase --abort; echo "Rebase conflict — aborting."; exit 1; }
          done
          echo "Failed to push after 5 attempts."
          exit 1
