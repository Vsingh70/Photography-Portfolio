# ACL permissions for the OAuth + Drive upload commands.
#
# Each [[permission]] block defines a permission that can be granted to a
# webview via a capability. By granting these to the main window
# (capabilities/default.json), the front-end can call invoke('start_oauth')
# and friends without being blocked by the ACL.

"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "allow-start-oauth"
description = "Open the system browser for Google sign-in and capture the redirect."
commands.allow = ["start_oauth"]

[[permission]]
identifier = "allow-signed-in-email"
description = "Read the cached signed-in email from disk."
commands.allow = ["signed_in_email"]

[[permission]]
identifier = "allow-sign-out"
description = "Clear the cached OAuth tokens on disk."
commands.allow = ["sign_out"]

[[permission]]
identifier = "allow-upload-to-drive"
description = "Upload a single file to Google Drive using the stored OAuth token."
commands.allow = ["upload_to_drive"]

# Convenience: a single permission set that grants all four commands at once.
# Capabilities can reference "oauth:default" instead of listing each one.
[default]
description = "All OAuth + Drive upload commands."
permissions = [
  "allow-start-oauth",
  "allow-signed-in-email",
  "allow-sign-out",
  "allow-upload-to-drive",
]
